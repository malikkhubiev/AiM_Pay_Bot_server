<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind Card</title>
    <script src="https://yookassa.ru/payouts-data/3.1.0/widget.js"></script>
</head>
<body>
    <style>
        html, body{
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .logo{
            width: 250px;
        }
    </style>
    <div id="payout-form"></div>
    <script>
        // Инициализация виджета PayoutsData
        const payoutsData = new window.PayoutsData({
            type: 'payout',
            account_id: '{{ account_id }}',  // Заменяется сервером
            success_callback: function(data) {
                console.log("Success:", data);

                // Отправка данных о привязке карты на сервер
                fetch('/bind_success', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "card_synonym": data.payout_token,
                        "unique_str": "{{ unique_str }}"  // Заменяется сервером
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка: ${response.status}`);
                    }
                    return response.json();
                })
                .then(result => {
                    console.log("Сервер ответил:", result);
                    // Перенаправление на страницу успеха
                    window.location.href = "/success";
                })
                .catch(error => {
                    console.error("Ошибка при отправке данных:", error);
                    alert("Ошибка на сервере. Попробуйте позже.");
                });
            },
            error_callback: function(error) {
                console.error("Ошибка привязки карты:", error);
                alert("Ошибка при привязке карты! Проверьте данные или повторите попытку позже.");
            },
            customization: {
                colors: {
                    background: '#1F1F1F', // Темный фон формы
                    control_primary: '#00BF96', // Базовый цвет кнопки Дальше и других акцентных элементов (можно оставить ярким для контраста)
                    control_primary_content: '#FFFFFF', // Белый цвет текста на кнопке Дальше
                    control_secondary: '#626262', // Цвет неакцентных элементов интерфейса (темный серый)
                    border: '#3A3A3A', // Темные границы и разделители
                    text: '#E0E0E0' // Светлый цвет текста на темном фоне
                }
            }
        });

        // Рендеринг формы
        payoutsData.render('payout-form').then(() => {
            console.log("Форма загружена");
        }).catch(error => {
            console.error("Ошибка загрузки формы:", error);
            alert("Не удалось загрузить платежную форму. Попробуйте позже.");
        });
    </script>
</body>
</html>
